name: iOS Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build CallBlocker
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Cache Build Objects
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-xcode-build-${{ hashFiles('**/*.swift') }}

      - name: Build for Simulator
        run: |
          # 这是一个编译检查，确保没有语法错误
          # 在没有证书的情况下，使用 CODE_SIGNING_ALLOWED=NO
          xcodebuild build \
            -project CallBlocker.xcodeproj \
            -scheme CallBlocker \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=build

      - name: Build Extension Only
        run: |
          xcodebuild build \
            -project CallBlocker.xcodeproj \
            -scheme CallBlockerExtension \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-Output
          path: build/
